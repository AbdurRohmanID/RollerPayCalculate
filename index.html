<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Produksi Roller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .kalkulator {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            line-height: 1.4;
        }
        .grup-input {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .hasil-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            text-align: center;
        }
        .hasil-box p {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }
        .hasil-box h3 {
            margin: 0;
            color: #28a745;
            font-size: 28px;
            word-break: break-all;
        }
        .detail-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #444;
            display: none;
        }
        .detail-box h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }
        .detail-item {
            margin-bottom: 6px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-total {
            font-weight: bold;
            margin-top: 12px;
            color: #222;
            text-align: right;
            border-top: 2px solid #ccc;
            padding-top: 8px;
        }
        .detail-pembagian {
            font-weight: bold;
            margin-top: 8px;
            color: #007bff;
            text-align: right;
        }
        .footer-teks {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #888;
            line-height: 1.5;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="kalkulator">
    <h2>KALKULATOR GAJI<br>ROLLER</h2>
    
    <div class="grup-input">
        <label for="hasilMesin">HASIL MESIN</label>
        <input type="number" id="hasilMesin" placeholder="Masukkan hasil mesin anda" min="0">
    </div>

    <div class="grup-input">
        <label for="rawVariant">PILIHAN RAW</label>
        <select id="rawVariant">
            <option value="1">No Shringkit</option>
            <option value="0.4">0,4</option>
            <option value="0.7">0,7</option>
            <option value="0.8">0,8</option>
            <option value="1.1">1,1</option>
        </select>
    </div>
    
    <div class="grup-input">
        <label for="jumlahOrang">JUMLAH ORANG</label>
        <input type="number" id="jumlahOrang" placeholder="Masukkan jumlah orang" min="1" value="1">
    </div>
    
    <button onclick="hitungGaji()">HITUNG GAJI</button>
    
    <div class="hasil-box">
        <p>GAJI ANDA</p>
        <h3 id="gajiAnda">Rp0,00</h3>
    </div>

    <div class="detail-box" id="detailBox">
        <h4>Detail Perhitungan:</h4>
        <div id="isiDetail"></div>
    </div>
    
    <div class="footer-teks">
        PaymentCalculate v2.0<br>
        By abdur_rohman.id
    </div>
</div>

<script>
    function formatRp(angka) {
        let formatted = new Intl.NumberFormat('id-ID', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(angka);
        return "Rp" + formatted;
    }

    function formatRibuan(angka) {
        return new Intl.NumberFormat('id-ID').format(angka);
    }

    function hitungGaji() {
        let hasilInput = document.getElementById('hasilMesin').value;
        let orangInput = document.getElementById('jumlahOrang').value;
        let rawMultiplier = parseFloat(document.getElementById('rawVariant').value);
        let variantText = document.getElementById('rawVariant').options[document.getElementById('rawVariant').selectedIndex].text;

        let hasil = parseFloat(hasilInput) || 0;
        let orang = parseInt(orangInput);

        if (!orangInput || orang < 1) {
            alert("Mohon masukkan JUMLAH ORANG yang valid (minimal 1).");
            return;
        }

        let totalUangAwal = 0;
        let sisaHasil = hasil;
        let detailHTML = "";

        // Kuota & Pengali Produksi Roller
        const tiers = [
            { maxQty: 300, multiplier: 190 },
            { maxQty: 275, multiplier: 221 },
            { maxQty: 250, multiplier: 257 },
            { maxQty: 250, multiplier: 292 },
            { maxQty: 275, multiplier: 328 },
            { maxQty: 225, multiplier: 361 },
            { maxQty: Infinity, multiplier: 395 }
        ];

        // Hitung Progresif
        for (let i = 0; i < tiers.length; i++) {
            if (sisaHasil > 0) {
                let kapasitas = Math.min(sisaHasil, tiers[i].maxQty);
                let hasilUang = kapasitas * tiers[i].multiplier;
                
                totalUangAwal += hasilUang;
                sisaHasil -= kapasitas;
                
                detailHTML += `
                    <div class="detail-item">
                        <span>Payment ${i + 1} (${formatRibuan(kapasitas)} × ${tiers[i].multiplier})</span> 
                        <span><b>${formatRp(hasilUang)}</b></span>
                    </div>`;
            } else {
                break;
            }
        }

        if (hasil === 0) {
            detailHTML += `<div class="detail-item" style="justify-content: center;">Tidak ada hasil produksi.</div>`;
        }

        // Terapkan Pengali RAW
        let totalUangAkhir = totalUangAwal * rawMultiplier;

        if (rawMultiplier !== 1) {
            detailHTML += `<div class="detail-total">Subtotal: ${formatRp(totalUangAwal)}</div>`;
            detailHTML += `
                <div class="detail-item" style="margin-top: 8px; border-bottom: none; border-top: 1px dashed #ccc; padding-top: 8px;">
                    <span style="color: #d35400;"><b>Varian RAW (${variantText})</b></span> 
                    <span style="color: #d35400;"><b>× ${rawMultiplier.toString().replace('.', ',')}</b></span>
                </div>`;
        }

        let gajiPerOrang = totalUangAkhir / orang;

        // Menampilkan Hasil
        document.getElementById('gajiAnda').innerText = formatRp(gajiPerOrang);
        document.getElementById('isiDetail').innerHTML = detailHTML;
        document.getElementById('isiDetail').innerHTML += `<div class="detail-total">Total Rupiah: ${formatRp(totalUangAkhir)}</div>`;
        document.getElementById('isiDetail').innerHTML += `<div class="detail-pembagian">Dibagi ${orang} Orang = ${formatRp(gajiPerOrang)}</div>`;
        document.getElementById('detailBox').style.display = 'block';
    }
</script>

</body>
</html>
